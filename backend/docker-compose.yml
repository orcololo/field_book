services:
  mongodb:
    image: mongo:8
    container_name: fieldbook-mongodb
    restart: unless-stopped
    ports:
      - '${MONGO_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-fieldbook}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-fieldbook_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-fieldbook}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:latest
    container_name: fieldbook-mongo-express
    restart: unless-stopped
    ports:
      - '${MONGO_EXPRESS_PORT:-8081}:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-fieldbook}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-fieldbook_secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME:-fieldbook}:${MONGO_PASSWORD:-fieldbook_secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
