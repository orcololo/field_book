name: Release APKs

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - run: flutter pub get

      - name: Fix legacy package attribute in plugin manifests
        run: |
          find "$HOME/.pub-cache/hosted/pub.dev" -path "*/android/src/main/AndroidManifest.xml" \
            -exec grep -ql 'package=' {} \; -exec sed -i 's/ package="[^"]*"//' {} \;

      - run: flutter build apk --split-per-abi --release

      - name: Rename APKs
        run: |
          TAG="${GITHUB_REF_NAME}"
          APK_DIR="build/app/outputs/flutter-apk"
          mv "$APK_DIR/app-armeabi-v7a-release.apk" "$APK_DIR/folium-${TAG}-armeabi-v7a.apk"
          mv "$APK_DIR/app-arm64-v8a-release.apk" "$APK_DIR/folium-${TAG}-arm64-v8a.apk"
          mv "$APK_DIR/app-x86_64-release.apk" "$APK_DIR/folium-${TAG}-x86_64.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/folium-*.apk

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/folium-*.apk
